<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KrediTask—To-Do List</title>

 
  <link rel="stylesheet" href="to-do-style.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <img class="logo-icon" src="kredi-logo.png" width="30px">
        <span class="logo-text">KrediTask</span>
      </div>
      <p class="tagline">...INCREASING PRODUCTIVITY AT KMFB</p>
    </div>
  </header>


  <main class="container">

    <section class="card form-card">

      <h2 class="card-title" id="form-title">Add a Task</h2>
      <div class="form-grid">

        <!-- Task Name -->
        <div class="form-group">
          <label for="todo-name">Task Name</label>
          <input
            type="text"
            id="todo-name"
            placeholder="e.g. Submit report"
          />
        </div>

        <!-- Date -->
        <div class="form-group">
          <label for="todo-date">Date</label>
          <input type="date" id="todo-date" />
        </div>

        <!-- Time -->
        <div class="form-group">
          <label for="todo-time">Time</label>
          <input type="time" id="todo-time" />
        </div>

      </div>

      
      <div class="btn-row">
        <button id="submit-btn" class="btn btn-primary" onclick="handleSubmit()">
          Add Task
        </button>

        
        <button
          id="cancel-btn"
          class="btn btn-ghost"
          style="display: none;"
          onclick="cancelEdit()"
        >
          Cancel
        </button>
      </div>

    </section>


    
    <section class="card table-card">

      <div class="table-header">
        <h2 class="card-title">My Tasks</h2>
        <span class="task-count" id="task-count">0 tasks</span>
      </div>

      <!-- Empty state: visible when the tasks array is empty -->
      <div class="empty-state" id="empty-state">
       <p>No tasks yet. Add one above to get started!</p>
      </div>

      <!-- The table: hidden when empty, shown when there are tasks -->
      <div class="table-wrapper" id="table-wrapper" style="display: none;">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Task Name</th>
              <th>Date</th>
              <th>Time</th>
              <th>Actions</th>
            </tr>
          </thead>
          <!-- tbody is filled dynamically by renderTable() in script.js -->
          <tbody id="task-table-body">
          </tbody>
        </table>
      </div>

    </section>


    <!-- --------------------------------------------------------
         VIEW MODAL
         A pop-up overlay that shows the full details of one task
         when the user clicks "View".
    -------------------------------------------------------- -->
    <div class="modal-overlay" id="modal-overlay" style="display: none;">
      <div class="modal-box">

        <button class="modal-close" onclick="closeModal()">✕</button>

        <h3 class="modal-title">Task Details</h3>

        
        <div id="modal-body" class="modal-body"></div>

        <button class="btn btn-primary" onclick="closeModal()">Close</button>

      </div>
    </div>

  </main>


<script src="to-do-script.js"></script>

</body>
</html>
